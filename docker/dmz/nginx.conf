worker_processes 1;
events { worker_connections 256; }
http {
  access_log /var/log/nginx/access.log;
  error_log  /var/log/nginx/error.log;

  server {
    listen 80;
    server_name _;

    location / {
      root /usr/share/nginx/html;
      index index.html;
    }

    location /health {
      default_type application/json;
      return 200 '{"status":"ok","zone":"dmz"}';
    }
  }
}
